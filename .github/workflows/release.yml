name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  DESKBRIDGE_BUILD_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  DESKBRIDGE_BUILD_COMMIT: ${{ github.sha }}

jobs:
  macos:
    name: macOS package
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Import macOS signing certificate
        env:
          MACOS_CODESIGN_CERTIFICATE_P12: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_P12 }}
          MACOS_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_CODESIGN_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_CODESIGN_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${MACOS_CODESIGN_CERTIFICATE_P12:-}" ]]; then
            echo "No macOS signing certificate configured; package will be ad-hoc signed."
            exit 0
          fi
          if [[ -z "${MACOS_CODESIGN_IDENTITY:-}" ]]; then
            echo "MACOS_CODESIGN_IDENTITY is required when MACOS_CODESIGN_CERTIFICATE_P12 is configured."
            exit 1
          fi

          KEYCHAIN="$RUNNER_TEMP/deskbridge-signing.keychain-db"
          KEYCHAIN_PASSWORD="${MACOS_CODESIGN_KEYCHAIN_PASSWORD:-deskbridge-signing}"
          CERTIFICATE_PATH="$RUNNER_TEMP/macos-signing.p12"

          echo "$MACOS_CODESIGN_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN" \
            -P "$MACOS_CODESIGN_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN"

          echo "DESKBRIDGE_CODESIGN_IDENTITY=$MACOS_CODESIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "DESKBRIDGE_CODESIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Package app
        run: ./scripts/package-macos-app.sh

      - name: Create release assets
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/DeskBridge.app dist/DeskBridge-macos.zip
          hdiutil create -volname DeskBridge -srcfolder build/DeskBridge.app -ov -format UDZO dist/DeskBridge-macos.dmg

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*

  windows:
    name: Windows package (${{ matrix.target.name }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x64
            rust: x86_64-pc-windows-msvc
            dotnet: win-x64
          - name: arm64
            rust: aarch64-pc-windows-msvc
            dotnet: win-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build daemon
        run: cargo build --release --target ${{ matrix.target.rust }} -p deskbridge

      - name: Publish admin app
        run: dotnet publish apps/windows/DeskBridge.Admin/DeskBridge.Admin.csproj --configuration Release --runtime ${{ matrix.target.dotnet }} --self-contained false --output package

      - name: Assemble package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item "target/${{ matrix.target.rust }}/release/deskbridge.exe" package/deskbridge.exe
          Copy-Item README.md package/README.md
          Copy-Item LICENSE package/LICENSE
          @"
          DeskBridge for Windows
          ======================

          Start here:
            1. Double-click DeskBridge.Admin.exe.
            2. Confirm Listen is 0.0.0.0:24800.
            3. Click Start Server.
            4. If Windows asks for firewall access, allow Private networks.

          Do not double-click deskbridge.exe unless you want the command-line daemon.
          The admin app starts it for you and shows server status.

          From the Mac, connect to:
            <WINDOWS_LAN_IP>:24800
          "@ | Set-Content package/README-WINDOWS.txt
          Compress-Archive -Path package/* -DestinationPath "DeskBridge-windows-${{ matrix.target.name }}.zip" -Force

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target.name }}
          path: DeskBridge-windows-${{ matrix.target.name }}.zip

  linux:
    name: Linux x64 package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build daemon
        run: cargo build --release -p deskbridge

      - name: Create release asset
        run: |
          set -euo pipefail
          mkdir -p package
          cp target/release/deskbridge package/deskbridge
          cp README.md LICENSE package/
          tar -czf DeskBridge-linux-x64.tar.gz -C package .

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: DeskBridge-linux-x64.tar.gz

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
      - linux

    steps:
      - uses: actions/checkout@v4

      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist -type f | sort)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --notes "DeskBridge preview release. macOS app uses configured signing when release secrets are present; otherwise it is ad-hoc signed. Windows packages include the daemon and WPF admin app."
          fi

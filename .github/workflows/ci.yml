name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust format
        run: cargo fmt --all --check

      - name: Rust tests
        run: cargo test --workspace

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  windows-arm-cross:
    name: Windows ARM64 Rust check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
          components: clippy

      - name: Check Windows ARM64 target
        run: cargo check --target aarch64-pc-windows-msvc -p deskbridge

      - name: Clippy Windows ARM64 target
        run: cargo clippy --target aarch64-pc-windows-msvc -p deskbridge --all-targets -- -D warnings

  windows-admin:
    name: Windows WPF admin
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore apps/windows/DeskBridge.Admin/DeskBridge.Admin.csproj

      - name: Build
        run: dotnet build apps/windows/DeskBridge.Admin/DeskBridge.Admin.csproj --configuration Release --no-restore

  macos-app:
    name: macOS app package
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and package macOS app
        run: ./scripts/package-macos-app.sh

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: DeskBridge.app
          path: build/DeskBridge.app

  tauri-desktop:
    name: Tauri desktop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build desktop app
        working-directory: apps/desktop/src-tauri
        run: cargo build

      - name: Clippy desktop app
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings

  loopback:
    name: Protocol loopback
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --workspace

      - name: Loopback protocol test
        shell: bash
        run: |
          set -euo pipefail
          ./target/debug/deskbridge server --listen 127.0.0.1:24881 --allow mac --demo-events >server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          sleep 1
          ./target/debug/deskbridge diag --server 127.0.0.1:24881 --name mac
          ./target/debug/deskbridge client --server 127.0.0.1:24881 --name mac --dry-run --max-events 1 --once

      - name: Debug control test
        shell: bash
        run: |
          set -euo pipefail
          RUST_LOG=info ./target/debug/deskbridge server --listen 127.0.0.1:24883 --allow mac --debug-capture-log >debug-server.log 2>&1 &
          SERVER_PID=$!
          CLIENT_PID=""
          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
            if [[ -n "${CLIENT_PID:-}" ]]; then
              kill "$CLIENT_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT
          for _ in {1..20}; do
            nc -z 127.0.0.1 24883 && break
            sleep 0.2
          done
          RUST_LOG=info ./target/debug/deskbridge client --server 127.0.0.1:24883 --name mac --dry-run >debug-client.log 2>&1 &
          CLIENT_PID=$!
          for _ in {1..30}; do
            grep -q "client accepted" debug-server.log && break
            if ! kill -0 "$CLIENT_PID" 2>/dev/null; then
              cat debug-client.log
              echo "debug client exited before connecting"
              exit 1
            fi
            sleep 0.2
          done
          if ! grep -q "client accepted" debug-server.log; then
            cat debug-server.log
            cat debug-client.log
            echo "debug client did not connect"
            exit 1
          fi
          ./target/debug/deskbridge debug --server 127.0.0.1:24883 --name mac display-info >debug-display.out
          ./target/debug/deskbridge debug --server 127.0.0.1:24883 --name mac move-mouse --dx 1 --dy 0 >debug-move.out
          ./target/debug/deskbridge debug --server 127.0.0.1:24883 --name mac route-status >debug-route-status.out
          ./target/debug/deskbridge debug --server 127.0.0.1:24883 --name mac route-probe --steps 2 --dx 40 --dy -1 >debug-route.out
          ./target/debug/deskbridge debug --server 127.0.0.1:24883 --name mac capture-probe --steps 2 --dx 40 --dy -1 >debug-capture.out
          ./target/debug/deskbridge debug --server 127.0.0.1:24883 --name mac perf >debug-perf.out
          ./target/debug/deskbridge debug --server 127.0.0.1:24883 --name mac peer-info >debug-peer.out
          ./target/debug/deskbridge debug --server 127.0.0.1:24883 --name mac server-logs >debug-server-logs.out
          ./target/debug/deskbridge debug --server 127.0.0.1:24883 --name mac logs >debug-logs.out
          grep -q "display:" debug-display.out
          grep -q "ok: true" debug-move.out
          grep -q "route status read" debug-route-status.out
          grep -q "link: windows Right -> mac" debug-route-status.out
          grep -q "route probe delivered and acknowledged 3 events" debug-route.out
          grep -q "event 0: target=mac MouseAbs" debug-route.out
          grep -q "ack seq=" debug-route.out
          grep -q "capture probe delivered and acknowledged 3 events through capture path" debug-capture.out
          grep -q "capture event 1 routed target=mac MouseAbs" debug-capture.out
          grep -q "ack seq=" debug-capture.out
          grep -q "server perf metrics read" debug-perf.out
          grep -q "ack_rtt p50=" debug-perf.out
          grep -q "client_apply p50=" debug-perf.out
          grep -q "role=client" debug-peer.out
          grep -q "role=server" debug-server-logs.out
          grep -q "client accepted" debug-server-logs.out
          grep -q "debug request" debug-logs.out

      - name: Reconnect after server start test
        shell: bash
        run: |
          set -euo pipefail
          RUST_LOG=info ./target/debug/deskbridge client --server 127.0.0.1:24882 --name mac --dry-run --max-events 1 >reconnect-client.log 2>&1 &
          CLIENT_PID=$!
          cleanup() {
            kill "$CLIENT_PID" 2>/dev/null || true
            if [[ -n "${SERVER_PID:-}" ]]; then
              kill "$SERVER_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT
          sleep 1.2
          RUST_LOG=info ./target/debug/deskbridge server --listen 127.0.0.1:24882 --allow mac --demo-events >reconnect-server.log 2>&1 &
          SERVER_PID=$!
          for _ in {1..30}; do
            if ! kill -0 "$CLIENT_PID" 2>/dev/null; then
              break
            fi
            sleep 0.2
          done
          if kill -0 "$CLIENT_PID" 2>/dev/null; then
            cat reconnect-client.log
            echo "client did not reconnect and receive an event"
            exit 1
          fi
          wait "$CLIENT_PID"
          grep -q "client session failed" reconnect-client.log
          grep -q "connected" reconnect-client.log
          grep -q "dry-run input event" reconnect-client.log
